<!DOCTYPE html>
<html>
  <head>
    <title>Escape Room VR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    
    <script>
      let tinteRamase = 3;

      function playAudio(id) {
        let audioEl = document.querySelector(id);
        if (audioEl) {
          audioEl.currentTime = 0;
          audioEl.play().catch(e => console.warn("Eroare redare audio:", e));
        }
      }

      // NOU: Funcția cerută de laborator pentru evaluarea utilizatorului
      function evalAplicatie(raspuns) {
        console.log('Evaluare:', raspuns); // Afișează în consolă conform cerinței
        let evalDiv = document.getElementById('evaluare');
        if (evalDiv) {
          // După ce utilizatorul votează, îi mulțumim și ascundem butoanele
          evalDiv.innerHTML = '<p style="color: #00ffcc; text-align: center; margin: 0; font-size: 18px; font-weight: bold;">Multumim pentru feedback!</p>';
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        let startBtn = document.getElementById("start-btn");
        let startScreen = document.getElementById("start-screen");
        let replayBtn = document.getElementById("replay-btn");
        let instructiuniPanel = document.getElementById("instructiuni");

        startBtn.addEventListener("click", () => {
          startScreen.style.display = "none";
          
          // Afișăm panoul de instrucțiuni cerut la laborator
          if (instructiuniPanel) {
            instructiuniPanel.style.display = "block";
          }
          
          if (AFRAME.scenes[0] && AFRAME.scenes[0].audioListener) {
            AFRAME.scenes[0].audioListener.context.resume();
          }

          let bgm = document.getElementById("bgm-audio");
          if (bgm) {
            bgm.volume = 0.35;
            bgm.play().catch(e => console.warn("Eroare redare BGM:", e));
          }
        });

        replayBtn.addEventListener("click", () => {
          window.location.reload(); 
        });
      });

      AFRAME.registerComponent('shootable', {
        init: function () {
          let target = this.el; 
          target.addEventListener('click', function () {
            
            let pata = document.querySelector('#pata-' + target.id);
            if(pata) pata.parentNode.removeChild(pata);

            target.parentNode.removeChild(target);
            tinteRamase--;
            
            let scoreText = document.querySelector('#text-scor');
            scoreText.setAttribute('value', 'Containere ramase: ' + tinteRamase);
            
            if (tinteRamase === 0) {
              scoreText.setAttribute('value', 'USA DESCHISA!\nClick o data pe ecran, apoi SPACE pentru a sari.');
              scoreText.setAttribute('color', '#00ffcc');
              
              let usa = document.querySelector('#usa-iesire');
              usa.setAttribute('animation', 'property: position; to: -4 2.5 -7.5; dur: 2000; easing: easeInOutQuad');

              let lasere = document.querySelectorAll('.laser');
              lasere.forEach(l => l.parentNode.removeChild(l));

              playAudio('#sunet-usa');
            }
          });
        }
      });

      AFRAME.registerComponent('player-physics', {
        init: function () {
          this.velocity = 0;
          this.isGrounded = true;
          this.floorY = 1.6; 
          this.isGameOver = false;

          window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && this.isGrounded && !this.isGameOver) {
              this.velocity = 0.15; 
              this.isGrounded = false;
              playAudio('#sunet-saritura');
            }
          });
        },
        tick: function () {
          if (this.isGameOver) return; 

          let pos = this.el.object3D.position;

          if (pos.z > -7.8) {
            this.floorY = 1.6; 
          } else if (pos.x > -1.5 && pos.x < 1.5 && pos.z < -9 && pos.z > -11) {
            this.floorY = 1.6; 
          } else if (pos.x > 0.5 && pos.x < 3.5 && pos.z < -11.5 && pos.z > -13.5) {
            this.floorY = 3.1; 
          } else if (pos.x > -3.5 && pos.x < -0.5 && pos.z < -14 && pos.z > -16) {
            this.floorY = 4.6; 
          } else if (pos.x > 0.5 && pos.x < 3.5 && pos.z < -16.5 && pos.z > -18.5) {
            this.floorY = 6.1; 
          } else if (pos.x > -3.5 && pos.x < -0.5 && pos.z < -19 && pos.z > -21) {
            this.floorY = 7.6; 
          } else if (pos.x > -4 && pos.x < 4 && pos.z < -21 && pos.z > -30) {
            this.floorY = 9.1; 
          } else {
            this.floorY = -20; 
          }

          if (!this.isGrounded || pos.y > this.floorY) {
            this.velocity -= 0.008; 
            pos.y += this.velocity;
            
            if (pos.y <= this.floorY && this.floorY !== -20) {
              pos.y = this.floorY;
              this.velocity = 0;
              this.isGrounded = true;
            }
          }

          if (pos.y < -3) {
            pos.x = 0; pos.y = 1.6; pos.z = -6.5; 
            this.velocity = 0; 
            this.isGrounded = true;
          }

          if (pos.z < -26 && pos.y > 8) {
            this.isGameOver = true;
            
            let bgm = document.getElementById("bgm-audio");
            if (bgm) {
              bgm.pause();
            }

            // Ascundem instrucțiunile când începe secvența de final
            let instr = document.getElementById("instructiuni");
            if(instr) instr.style.display = "none";

            document.querySelector('#fade-screen').emit('shutdown');
            document.querySelector('#shutdown-text').emit('shutdown');
            
            setTimeout(() => {
              let gunParts = document.querySelectorAll('a-camera a-box');
              gunParts.forEach(p => p.parentNode.removeChild(p));
              
              let cursor = document.querySelector('a-cursor');
              if(cursor) cursor.parentNode.removeChild(cursor);

              let lights = document.querySelectorAll('a-light');
              lights.forEach(l => l.parentNode.removeChild(l));
              
              let targets = document.querySelectorAll('.tinta, .decor, a-plane:not(#fade-screen), a-cylinder:not(#c1, #c2, #c3)');
              targets.forEach(t => { if(t.id !== 'fade-screen') t.parentNode.removeChild(t); });
            }, 2000);

            setTimeout(() => {
              let finalTxt = document.querySelector('#shutdown-text');
              if(finalTxt) finalTxt.parentNode.removeChild(finalTxt);
              
              // Afișăm butonul de Replay
              let rBtn = document.getElementById('replay-btn');
              if(rBtn) rBtn.style.display = "block";

              // Afișăm formularul de Evaluare
              let eDiv = document.getElementById('evaluare');
              if(eDiv) eDiv.style.display = "block";
            }, 7000);
          }
        }
      });
    </script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">

    <div id="start-screen" style="position: absolute; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f1a; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-family: sans-serif;">
      <h1 style="font-size: 40px; margin-bottom: 10px; color: #00ffcc;">PROTOCOL SHUTDOWN</h1>
      <p style="font-size: 18px; margin-bottom: 30px;">Apasa butonul de mai jos pentru a incepe misiunea.</p>
      <button id="start-btn" style="padding: 15px 40px; font-size: 20px; cursor: pointer; background: #E74C3C; color: white; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; box-shadow: 0px 0px 15px #E74C3C;">START JOC</button>
    </div>

    <div id="instructiuni" style="position: absolute; top: 20px; right: 20px; background: rgba(15, 15, 26, 0.8); padding: 15px; border-radius: 8px; border: 1px solid #00ffcc; width: 250px; color: white; font-family: sans-serif; z-index: 1000; display: none;">
      <strong style="color: #00ffcc; font-size: 16px;">Misiune:</strong>
      <p style="font-size: 14px; margin-top: 8px; line-height: 1.5;">1. Distruge cele 3 containere.<br>2. Treci de abis (WASP pentru a te misca, apasa SPACE pentru a sari).<br>3. Ajungi la portalul albastru.</p>
    </div>

    <div id="evaluare" style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(15, 15, 26, 0.9); padding: 20px; border-radius: 8px; border: 1px solid #ff4444; text-align: center; color: white; font-family: sans-serif; z-index: 1000; display: none;">
      <strong style="color: #ff4444; font-size: 18px;">Evaluare Aplicatie</strong>
      <p style="font-size: 14px; margin: 10px 0 15px 0;">Cum ti s-a parut interactiunea?</p>
      <button onclick="evalAplicatie('buna')" style="padding: 10px 20px; margin: 0 5px; cursor: pointer; background: #00ffcc; border: none; border-radius: 4px; font-weight: bold; color: #000;">Buna</button>
      <button onclick="evalAplicatie('medie')" style="padding: 10px 20px; margin: 0 5px; cursor: pointer; background: #f39c12; border: none; border-radius: 4px; font-weight: bold; color: #000;">Medie</button>
      <button onclick="evalAplicatie('slaba')" style="padding: 10px 20px; margin: 0 5px; cursor: pointer; background: #e74c3c; border: none; border-radius: 4px; font-weight: bold; color: #fff;">Slaba</button>
    </div>

    <button id="replay-btn" style="position: absolute; z-index: 10000; top: 40%; left: 50%; transform: translate(-50%, -50%); padding: 15px 40px; font-size: 20px; cursor: pointer; background: #00ffcc; color: #0f0f1a; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; box-shadow: 0px 0px 15px #00ffcc; display: none;">REBOOT SIMULATION</button>

    <a-scene fog="type: linear; color: #05050a; near: 1; far: 22">
      <a-assets timeout="5000">
        <audio id="sunet-saritura" src="sunete/ugh.wav" preload="auto"></audio>
        <audio id="sunet-usa" src="woosh.wav" preload="auto"></audio>
        <audio id="bgm-audio" src="bgm.wav" preload="auto" loop="true"></audio>
      </a-assets>

      <a-sky color="#05050a"></a-sky>

      <a-plane class="decor" position="0 0 0" rotation="-90 0 0" width="15" height="15" color="#0a0a14"></a-plane>
      <a-plane class="decor" position="0 10 0" rotation="90 0 0" width="15" height="15" color="#1a1a2e"></a-plane>
      <a-plane class="decor" position="0 5 7.5" rotation="0 180 0" width="15" height="10" color="#1a1a2e"></a-plane>
      <a-plane class="decor" position="-7.5 5 0" rotation="0 90 0" width="15" height="10" color="#1a1a2e"></a-plane>
      <a-plane class="decor" position="7.5 5 0" rotation="0 -90 0" width="15" height="10" color="#1a1a2e"></a-plane>
      <a-plane class="decor" position="-4.75 5 -7.5" width="5.5" height="10" color="#1a1a2e"></a-plane>
      <a-plane class="decor" position="4.75 5 -7.5" width="5.5" height="10" color="#1a1a2e"></a-plane>
      <a-plane class="decor" position="0 7.5 -7.5" width="4" height="5" color="#1a1a2e"></a-plane>

      <a-box class="decor" id="usa-iesire" position="0 2.5 -7.5" width="4" height="5" depth="0.2" color="#333344"></a-box>
      <a-text class="decor" id="text-scor" value="Containere ramase: 3" position="0 6 -7.4" align="center" width="7" color="#ff4444"></a-text>

      <a-text class="decor" value="DANGER\nBIOHAZARD" position="-7.4 5 0" rotation="0 90 0" align="center" color="#ff0000" scale="2 2 2" material="opacity: 0.6"></a-text>
      <a-text class="decor" value="RESTRICTED AREA" position="7.4 4 -3" rotation="0 -90 0" align="center" color="#ffaa00" scale="1.5 1.5 1.5" material="opacity: 0.5"></a-text>

      <a-cylinder class="decor laser" position="0 2 -3" rotation="90 45 0" radius="0.02" height="15" color="#ff0000" 
                  material="emissive: #ff0000; transparent: true" 
                  animation="property: material.opacity; from: 0; to: 0.8; dur: 400; dir: alternate; loop: true; easing: linear"></a-cylinder>
      <a-cylinder class="decor laser" position="-2 3 -5" rotation="90 -30 0" radius="0.02" height="15" color="#ff0000" 
                  material="emissive: #ff0000; transparent: true" 
                  animation="property: material.opacity; from: 0; to: 0.8; dur: 400; dir: alternate; loop: true; easing: linear"></a-cylinder>

      <a-box class="decor" position="5 0.5 4" rotation="10 45 15" width="1" height="1" depth="1" color="#2c3e50" material="metalness: 0.6"></a-box>
      <a-box class="decor" position="5.5 0.6 3" rotation="0 20 0" width="1.2" height="1.2" depth="1.2" color="#34495e" material="metalness: 0.6"></a-box>
      <a-box class="decor" position="-6 0.5 5" rotation="-20 10 -10" width="1.5" height="1" depth="1.5" color="#2c3e50" material="metalness: 0.6"></a-box>

      <a-cylinder id="c1" class="tinta" position="-4 1.5 -5" radius="0.4" height="1.5" color="#00ffcc" material="emissive: #00ffcc" shootable></a-cylinder>
      <a-cylinder id="c2" class="tinta" position="3 4 -4" radius="0.4" height="1.5" color="#00ffcc" material="emissive: #00ffcc" rotation="90 0 0" shootable></a-cylinder>
      <a-cylinder id="c3" class="tinta" position="5 1 -2" radius="0.4" height="1.5" color="#00ffcc" material="emissive: #00ffcc" shootable></a-cylinder>

      <a-circle class="decor" id="pata-c1" position="-4 0.01 -5" rotation="-90 0 0" radius="1.2" color="#00ffcc" material="emissive: #00ffcc; transparent: true; opacity: 0.4"></a-circle>
      <a-circle class="decor" id="pata-c2" position="3 0.01 -4" rotation="-90 0 0" radius="1.5" color="#00ffcc" material="emissive: #00ffcc; transparent: true; opacity: 0.3"></a-circle>
      <a-circle class="decor" id="pata-c3" position="5 0.01 -2" rotation="-90 0 0" radius="1" color="#00ffcc" material="emissive: #00ffcc; transparent: true; opacity: 0.5"></a-circle>

      <a-light class="decor" type="ambient" color="#222"></a-light>
      <a-light class="decor" type="point" color="#ff4444" position="0 5 0"
               animation="property: intensity; from: 0; to: 0.8; dur: 400; dir: alternate; loop: true; easing: linear">
      </a-light>

      <a-cylinder class="decor" position="0 5 -18" radius="14" height="60" color="#0a0a14" material="side: back; metalness: 0.6; roughness: 0.8" open-ended="true"></a-cylinder>
      <a-light class="decor" type="point" color="#ff2222" position="0 6 -18" distance="25"
               animation="property: intensity; from: 0.2; to: 1.5; dur: 1000; dir: alternate; loop: true; easing: easeInOutSine">
      </a-light>

      <a-entity class="decor" position="0 5 -18" animation="property: rotation; to: 0 360 0; dur: 30000; loop: true; easing: linear">
        <a-box position="5 3 5" width="0.5" height="0.5" depth="0.5" color="#00ffcc" material="emissive: #00ffcc; emissiveIntensity: 0.3" animation="property: rotation; to: 360 360 0; dur: 5000; loop: true; easing: linear"></a-box>
        <a-box position="-6 -2 -4" width="0.8" height="0.8" depth="0.8" color="#2c3e50" material="metalness: 0.8" animation="property: rotation; to: 0 360 360; dur: 7000; loop: true; easing: linear"></a-box>
        <a-box position="4 8 -6" width="0.4" height="0.4" depth="0.4" color="#e74c3c" material="emissive: #e74c3c; emissiveIntensity: 0.3" animation="property: rotation; to: 360 0 360; dur: 4000; loop: true; easing: linear"></a-box>
      </a-entity>

      <a-box class="decor" position="0 0 -10" width="3" height="0.2" depth="2" color="#e67e22" material="emissive: #e67e22"></a-box>
      <a-box class="decor" position="2 1.5 -12.5" width="3" height="0.2" depth="2" color="#e67e22" material="emissive: #e67e22"></a-box>
      <a-box class="decor" position="-2 3 -15" width="3" height="0.2" depth="2" color="#e67e22" material="emissive: #e67e22"></a-box>
      <a-box class="decor" position="2 4.5 -17.5" width="3" height="0.2" depth="2" color="#e67e22" material="emissive: #e67e22"></a-box>
      <a-box class="decor" position="-2 6 -20" width="3" height="0.2" depth="2" color="#e67e22" material="emissive: #e67e22"></a-box>

      <a-box class="decor" position="0 7.5 -25" width="8" height="0.5" depth="8" color="#1a1a2e"></a-box>
      <a-cylinder class="decor" position="0 10 -28" rotation="90 0 0" radius="2" color="#3498db" material="emissive: #3498db"></a-cylinder>

      <a-camera position="0 1.6 0" wasd-controls="acceleration: 60" player-physics>
        <a-cursor position="0 0 -0.9" color="#ff0000" scale="0.7 0.7 0.7"></a-cursor>
        
        <a-box position="0.3 -0.3 -0.6" width="0.06" height="0.06" depth="0.4" color="#ffffff"></a-box>
        <a-box position="0.3 -0.3 -0.8" width="0.04" height="0.04" depth="0.1" color="#00ffcc" material="emissive: #00ffcc"></a-box>
        <a-box position="0.3 -0.4 -0.4" width="0.05" height="0.15" depth="0.05" color="#111111" rotation="-20 0 0"></a-box>

        <a-plane id="fade-screen" position="0 0 -0.2" width="2" height="2" color="#000000" 
                 opacity="0" transparent="true" 
                 animation="property: opacity; from: 0; to: 1; dur: 2000; startEvents: shutdown">
        </a-plane>
        
        <a-text id="shutdown-text" value="SYSTEM SHUTDOWN...\n\nREBOOTING" 
                position="0 0 -0.1" align="center" color="#ff0000" width="0.3"
                opacity="0" 
                animation__fade="property: opacity; from: 0; to: 1; dur: 2000; delay: 1000; startEvents: shutdown"
                animation__blink="property: opacity; from: 1; to: 0; dur: 400; loop: true; dir: alternate; delay: 3000; startEvents: shutdown">
        </a-text>
      </a-camera>

    </a-scene>
  </body>
</html>
